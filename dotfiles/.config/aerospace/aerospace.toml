# AeroSpace tiling window manager config
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2
start-at-login = true
auto-reload-config = true

# Prevents cmd-h (hide app) from breaking tiling layout
automatically-unhide-macos-hidden-apps = true

# Normalization keeps the window tree clean:
# - flatten-containers: removes redundant nesting
# - opposite-orientation: auto-fixes orientation when nesting containers
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# 'tiles' = side-by-side windows, 'accordion' = stacked (like tabs but spatial)
default-root-container-layout = 'tiles'

# 'auto' = horizontal on wide monitors, vertical on tall monitors
default-root-container-orientation = 'auto'

# Padding between windows in accordion mode
accordion-padding = 30

# When switching monitors, move the mouse cursor to the new monitor
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner) and between windows and screen edges (outer)
[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.bottom     = 10
outer.top        = 10
outer.right      = 10

# Main keybindings (always active)
# All commands: https://nikitabobko.github.io/AeroSpace/commands
[mode.main.binding]

# Move focus between windows
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move the focused window in a direction
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Switch to a workspace by number
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Send the focused window to a workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Toggle fullscreen for the focused window
alt-f = 'fullscreen'

# Toggle between floating (free-form) and tiling (managed) layout
alt-shift-f = 'layout floating tiling'

# Cycle between horizontal and vertical tiling
alt-slash = 'layout tiles horizontal vertical'

# Cycle between horizontal and vertical accordion (stacked) layout
alt-comma = 'layout accordion horizontal vertical'

# Resize the focused window
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Jump to the previous workspace (like alt-tab but for workspaces)
alt-tab = 'workspace-back-and-forth'

# Move the entire workspace to the next monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Enter service mode for less common operations
alt-shift-semicolon = 'mode service'

# Service mode: press alt+shift+; to enter, esc to exit
# These are operations you don't need instant access to
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']           # Reset layout tree to a clean state
f = ['layout floating tiling', 'mode main']            # Toggle floating/tiling
backspace = ['close-all-windows-but-current', 'mode main']

# Join the focused window into a container with the window in that direction
# Useful for manually creating split layouts (e.g. one window left, two stacked right)
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

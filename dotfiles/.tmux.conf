# Change the leader key
set -g prefix C-s

# Allow adjusting pane limits with the mouse
set -g mouse on

# Set status bar at the top
set-option -g status-position top

# Set vi keybindings
set-window-option -g mode-keys vi

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# List of plugins (https://github.com/tmux-plugins/tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'     # sane defaults + <Leader>R keybinding to reload tmux configuration
set -g @plugin 'tmux-plugins/tmux-pain-control' # Vim-style navigation keybindings
set -g @plugin 'christoomey/vim-tmux-navigator' # Seamless navigation between nvim and tmux splits
set -g @plugin 'MaximilianGaedig/tmux-filter'   # Filter the current buffer by some text/pattern with <Leader>F
set -g @plugin 'tmux-plugins/tmux-yank'         # Copy to the system clipboard in tmux
set -g @plugin 'omerxx/tmux-floax'              # Floating pane for tmux


### TokyoNight colors for Tmux
set -g mode-style "fg=#7aa2f7,bg=#3b4261"

set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#7aa2f7,bg=#1f2335"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1d202f,bg=#7aa2f7,bold] #{?client_prefix,󰠠,#[dim]󰤂}#[bold,nodim] #S "
set -g status-right "#[fg=#7aa2f7,bg=#1f2335] #{prefix_highlight} #[fg=#7aa2f7,bg=#3b4261] %Y-%m-%d %I:%M %p #[fg=#1d202f,bg=#7aa2f7,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#7aa2f7,bg=#1f2335] #{prefix_highlight} #[fg=#7aa2f7,bg=#3b4261] %Y-%m-%d %H:%M #[fg=#1d202f,bg=#7aa2f7,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-format "#[default] #I #W #F "
setw -g window-status-current-format "#[fg=#7aa2f7,bg=#3b4261,bold] #I #W #F "


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
